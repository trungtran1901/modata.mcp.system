services:

  # ── Redis (schema cache) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: modata-mcp-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MCP Gateway ───────────────────────────────────────────
  mcp-gateway:
    build: .
    container_name: modata-mcp-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8001"
      REDIS_HOST: redis
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/sse"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

networks:
  default:
    name: modata-mcp-network