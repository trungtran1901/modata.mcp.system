  # ── MCP Gateway ───────────────────────────────────────────
  mcp-gateway:
    image: 192.168.100.43:5000/modata.mcp.system:0.0.1
    container_name: modata-mcp-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8001"
      # REDIS_HOST: redis
    ports:
      - "8005:8001"
    networks:
      - modata-ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/sse"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

networks:
  modata-ai:
    driver: bridge
    ipam:
      config:
        - subnet: "173.20.0.0/16"